# ─── Upstream definitions ─────────────────────────────────────────────────────
upstream backend {
    server backend:8080;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
    keepalive 16;
}

# ─── Main HTTP server ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;          # Accept any hostname / EC2 IP

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-XSS-Protection        "1; mode=block"                 always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Client body size: match application.yml multipart limit (6MB) ─────────
    client_max_body_size 6m;

    # ── API routes → Spring Boot backend ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";  # keepalive to upstream

        # ── Cookie passthrough ────────────────────────────────────────────
        # AuthService sets HttpOnly refresh_token cookie on path /api/v1/auth
        # proxy_pass_header ensures Set-Cookie header reaches the browser
        proxy_pass_header  Set-Cookie;
        proxy_cookie_path  /api/v1/auth  /api/v1/auth;

        # ── Timeouts ──────────────────────────────────────────────────────
        proxy_connect_timeout  30s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # ── Buffer tuning ─────────────────────────────────────────────────
        proxy_buffering   on;
        proxy_buffer_size 8k;
        proxy_buffers     8 8k;
    }

    # ── Actuator health endpoint (suppress access log spam from healthchecks) ─
    location = /api/v1/actuator/health {
        proxy_pass         http://backend/api/v1/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── All other requests → React frontend (static files) ───────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;

        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;
    }
}
