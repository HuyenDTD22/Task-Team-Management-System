name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/huyendtd22/task-team-management-system/backend
  FRONTEND_IMAGE: ghcr.io/huyendtd22/task-team-management-system/frontend

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Chạy backend tests với PostgreSQL service container
  # Chạy trên cả PR và push main
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: |
          ./mvnw test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/testdb \
            -Dspring.datasource.username=testuser \
            -Dspring.datasource.password=testpassword \
            -Dspring.profiles.active=test \
            -DJWT_SECRET=dGVzdC1qd3Qtc2VjcmV0LWZvci1jaS1waXBlbGluZS1vbmx5LW5vdC11c2VkLWluLXByb2Q= \
            -DCLOUDINARY_CLOUD_NAME=test \
            -DCLOUDINARY_API_KEY=test \
            -DCLOUDINARY_API_SECRET=test \
            -DFRONTEND_URL=http://localhost:5173

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build Docker images và push lên GHCR
  # Chỉ chạy khi push lên main (không chạy trên PR)
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write # Cần để push lên GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Tự động inject, không cần thêm secret

      - name: Extract short Git SHA (7 ký tự)
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ── Build & push backend image ─────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.BACKEND_IMAGE }}:latest
          # GHA layer cache — tăng tốc build đáng kể cho Maven dependencies
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ── Build & push frontend image ────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.FRONTEND_IMAGE }}:latest
          # Cache scope riêng cho frontend (node_modules vs Maven dependencies)
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy lên AWS EC2 qua SSH
  # Chỉ chạy sau khi build-and-push thành công
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          script: |
            set -e
            cd /home/ubuntu/task-manager

            # Authenticate GHCR để pull images (cần thiết nếu repo private)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            # Pull images backend và frontend mới nhất từ GHCR
            docker compose pull backend frontend

            # Recreate containers với images mới, remove orphan containers
            docker compose up -d --remove-orphans

            # Dọn dangling images để tiết kiệm disk trên t3.small (20GB)
            docker image prune -f

            # Chờ containers khởi động xong rồi verify
            sleep 10
            docker compose ps
