spring:
  application:
    name: task-manager
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB # Matches CloudinaryService business limit
      max-request-size: 6MB # Slightly above to accommodate multipart framing

  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns schema — Hibernate only validates
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
    open-in-view: false # Prevent lazy-load issues in controllers

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Allows Flyway to work on pre-existing DBs

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:1800000} # 30 min (ms)
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000} # 7 days (ms)

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /api/v1/actuator
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    disable-swagger-default-url: true

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  max-file-size: 5MB

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
