server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing: React Router createBrowserRouter ─────────────────────────
    # Mọi route không khớp file thật đều trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache hashed static assets 1 năm ──────────────────────────────────────
    # Vite tự động thêm content hash vào tên file (vd: index-Dz8r3k1A.js)
    # → safe để cache vĩnh viễn
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache images/icons 30 ngày ────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── index.html KHÔNG cache (luôn lấy bản mới nhất sau mỗi deploy) ─────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
