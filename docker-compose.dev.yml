# ─── Local development: PostgreSQL only ──────────────────────────────────────
# Usage: docker compose -f docker-compose.dev.yml up -d
# Backend and frontend run locally (mvn spring-boot:run / npm run dev)

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-db-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
